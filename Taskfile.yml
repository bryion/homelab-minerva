version: "3"

vars:
  CLUSTER_NAME: homelab-minerva
  NODE_IP: 192.168.1.X  # Replace with node IP
  GITHUB_OWNER: ""          # Replace with GitHub org/user
  GITHUB_REPO: homelab-minerva

tasks:
  # --- Node ---
  node:bootstrap:
    desc: Bootstrap Ubuntu 24.04 + k3s on the bare metal node
    cmds:
      - ansible-playbook -i ansible/inventory/hosts.yml ansible/playbooks/ubuntu-bootstrap.yml

  node:upgrade:
    desc: Run apt upgrade and reboot if required
    cmds:
      - >
        ansible -i ansible/inventory/hosts.yml k3s -b -m apt
        -a "upgrade=dist update_cache=yes"
      - >
        ansible -i ansible/inventory/hosts.yml k3s -b -m reboot
        -a "reboot_timeout=300"

  # --- k3s ---
  k3s:upgrade:
    desc: Upgrade k3s to INSTALL_K3S_VERSION (e.g. v1.32.0+k3s1)
    cmds:
      - ansible-playbook -i ansible/inventory/hosts.yml ansible/playbooks/k3s-upgrade.yml

  k3s:kubeconfig:
    desc: Fetch kubeconfig from node and write to ./kubeconfig
    cmds:
      - >
        ansible -i ansible/inventory/hosts.yml k3s -b
        -m fetch -a "src=/etc/rancher/k3s/k3s.yaml dest=kubeconfig flat=yes"
      - sed -i '' 's|https://127.0.0.1:6443|https://{{.NODE_IP}}:6443|' kubeconfig

  # --- Flux ---
  flux:bootstrap:
    desc: Bootstrap Flux on the cluster
    cmds:
      - >
        flux bootstrap github
        --owner={{.GITHUB_OWNER}}
        --repository={{.GITHUB_REPO}}
        --branch=main
        --path=kubernetes
        --personal

  flux:reconcile:
    desc: Force Flux reconciliation
    cmds:
      - flux reconcile source git flux-system
      - flux reconcile kustomization flux-system

  # --- SOPS ---
  sops:age-keygen:
    desc: Generate a new age key pair
    cmds:
      - age-keygen -o age.agekey
      - echo "Public key above — add it to .sops.yaml"
      - echo "Move age.agekey to a secure location and set SOPS_AGE_KEY_FILE"

  sops:encrypt:
    desc: Encrypt a file in place with SOPS
    cmds:
      - sops --encrypt --in-place {{.CLI_ARGS}}

  # --- Kubernetes ---
  k:ns:
    desc: List all namespaces
    cmds:
      - kubectl get namespaces

  # --- Validation ---
  validate:yaml:
    desc: Lint all YAML files
    cmds:
      - yamllint -c .yamllint.yml . || yamllint .

  validate:k8s:
    desc: Validate Kubernetes manifests
    cmds:
      - >
        kubeconform -summary -strict
        -ignore-missing-schemas
        -skip kubernetes/flux-system/
        kubernetes/
